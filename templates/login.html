{% extends "base.html" %}
{% block title %}Login - RL Metais{% endblock %}

{% block content %}
  <h2 class="center">Login</h2>
  <p class="center">
    Acesse o gerador de relatórios END com seu e-mail e senha.
  </p>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="post" action="{{ url_for('login') }}">
    <div class="field">
      <label for="email">E-mail</label>
      <input
        type="email"
        id="email"
        name="email"
        required
        placeholder="admin@rlmetais.com.br"
      />
    </div>

    <div class="field">
      <label for="password">Senha</label>
      <input
        type="password"
        id="password"
        name="password"
        required
        placeholder="*******"
      />
    </div>

    <button type="submit" class="btn btn-block">Entrar</button>
  </form>
{% endblock %}
