{% extends "base.html" %}
{% block title %}Cadastro de Clientes - RL Metais{% endblock %}

{% block extra_head %}
<style>
  .clientes-container {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 16px;
  }

  .clientes-list {
    border: 1px solid #a0a0a0;
    background-color: #ffffff;
    padding: 8px;
    height: 420px;
    overflow-y: auto;
    font-size: 13px;
  }

  .clientes-list h4 {
    font-size: 14px;
    margin-top: 0;
    margin-bottom: 8px;
  }

  .cliente-item {
    padding: 4px 6px;
    border-bottom: 1px solid #e0e0e0;
    cursor: default;
  }

  .cliente-item:hover {
    background-color: #f0f0f0;
  }

  .clientes-form {
    border: 1px solid #a0a0a0;
    background-color: #ffffff;
    padding: 12px 16px;
    font-size: 13px;
  }

  .field-row {
    display: grid;
    grid-template-columns: 110px 1fr 90px 120px;
    gap: 8px;
    margin-bottom: 6px;
    align-items: center;
  }

  .field-row-2 {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 8px;
    margin-bottom: 6px;
    align-items: center;
  }

  .field-row-3 {
    display: grid;
    grid-template-columns: 110px 120px 60px 1fr;
    gap: 8px;
    margin-bottom: 6px;
    align-items: center;
  }

  .field-row-cep {
    display: grid;
    grid-template-columns: 110px 120px 40px 1fr;
    gap: 8px;
    margin-bottom: 6px;
    align-items: center;
  }

  .field-row-telefone {
    display: grid;
    grid-template-columns: 110px 60px 1fr;
    gap: 8px;
    margin-bottom: 6px;
    align-items: center;
  }

  .field-row label {
    font-size: 12px;
  }

  .field-row input,
  .field-row-2 input,
  .field-row-3 input,
  .field-row-cep input,
  .field-row-telefone input,
  .field-row-cep select,
  .field-row-3 select {
    font-size: 12px;
    padding: 3px 4px;
    border: 1px solid #a0a0a0;
    border-radius: 2px;
  }

  .clientes-buttons {
    margin-top: 12px;
    text-align: right;
  }

  .btn-small {
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 2px;
    border: 1px solid #808080;
    background-color: #e0e0e0;
    margin-left: 4px;
  }

  .btn-small:hover {
    background-color: #d4d4d4;
  }

</style>
{% endblock %}

{% block content %}
  <h3 style="font-size: 14px; margin-top: 0; margin-bottom: 10px;">
    Cadastro / Edição de Cliente
  </h3>

  <div class="clientes-container">
    <!-- LADO ESQUERDO: LISTA DE CLIENTES -->
    <div class="clientes-list">
      <h4>Clientes</h4>

      <!-- Por enquanto, estático só para visual. Depois ligamos no banco. -->
      <div class="cliente-item">RL Metais - Exemplo</div>
      <div class="cliente-item">Empresa Teste 1</div>
      <div class="cliente-item">Empresa Teste 2</div>
    </div>

    <!-- LADO DIREITO: FORMULÁRIO -->
    <div class="clientes-form">
      <!-- Linha: Razão Social -->
      <div class="field-row-2">
        <label for="razao_social">Razão Social</label>
        <input type="text" id="razao_social" name="razao_social" />
      </div>

      <!-- Linha: Contato -->
      <div class="field-row-2">
        <label for="contato">Contato</label>
        <input type="text" id="contato" name="contato" />
      </div>

      <!-- Linha: CNPJ / IE -->
      <div class="field-row">
        <label for="cnpj">CNPJ</label>
        <input type="text" id="cnpj" name="cnpj" />

        <label for="ie">IE</label>
        <input type="text" id="ie" name="ie" />
      </div>

      <!-- Linha: Rua / Número -->
      <div class="field-row">
        <label for="rua">Rua</label>
        <input type="text" id="rua" name="rua" />

        <label for="numero">Número</label>
        <input type="text" id="numero" name="numero" />
      </div>

      <!-- Linha: Bairro / Cidade -->
      <div class="field-row">
        <label for="bairro">Bairro</label>
        <input type="text" id="bairro" name="bairro" />

        <label for="cidade">Cidade</label>
        <input type="text" id="cidade" name="cidade" />
      </div>

      <!-- Linha: UF / CEP -->
      <div class="field-row-cep">
        <label for="uf">UF</label>
        <select id="uf" name="uf">
          <option value="">Selecionar</option>
          <option>SP</option>
          <option>MG</option>
          <option>RJ</option>
          <option>PR</option>
          <!-- (depois podemos preencher todas) -->
        </select>

        <label for="cep">CEP</label>
        <input type="text" id="cep" name="cep" />
      </div>

      <!-- Linha: DDD / Telefone -->
      <div class="field-row-telefone">
        <label for="ddd">DDD / Telefone</label>
        <input type="text" id="ddd" name="ddd" placeholder="19" />
        <input type="text" id="telefone" name="telefone" />
      </div>

      <!-- Linha: Email -->
      <div class="field-row-2">
        <label for="email">E-mail</label>
        <input type="text" id="email" name="email" />
      </div>

      <!-- Botões -->
      <div class="clientes-buttons">
        <button type="button" class="btn-small">Novo</button>
        <button type="button" class="btn-small">Salvar</button>
        <button type="button" class="btn-small">Excluir</button>
        <button type="button" class="btn-small"
          onclick="window.location.href='{{ url_for('dashboard') }}'">
          Fechar
        </button>
      </div>
    </div>
  </div>
{% endblock %}
