<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}RL Metais - END{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Bootstrap básico -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #d9d9d9; /* fundo cinza igual “app” */
      }

      .app-window {
        max-width: 900px;
        margin: 40px auto;
        background-color: #f0f0f0;
        border: 1px solid #a0a0a0;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
      }

      .app-header {
        background-color: #c0c0c0;
        padding: 8px 12px;
        border-bottom: 1px solid #a0a0a0;
        font-size: 14px;
      }

      .app-body {
        padding: 24px 32px;
      }

      .btn-menu {
        display: block;
        width: 100%;
        margin-bottom: 12px;
        padding: 10px 12px;
        text-align: left;
        border-radius: 4px;
        border: 1px solid #999;
        background-color: #e0e0e0;
        font-size: 14px;
      }

      .btn-menu:hover {
        background-color: #d4d4d4;
      }

      .logo {
        text-align: center;
        margin-bottom: 24px;
      }

      .logo span {
        display: inline-block;
        padding: 8px 16px;
        border: 1px solid #999;
        background-color: #ffffff;
        font-weight: bold;
        font-size: 16px;
      }
    </style>

    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <div class="app-window">
      <div class="app-header">
        RL Metais - Gerador de Relatórios END
        {% if session.user_email %}
        <span class="float-end">Usuário: {{ session.user_email }}</span>
        {% endif %}
      </div>

      <div class="app-body">
        {% block content %}{% endblock %}
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
