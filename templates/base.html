<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}RL Metais - END{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f3f4f6;
        margin: 0;
        padding: 0;
      }
      .topbar {
        background: #111827;
        color: #f9fafb;
        padding: 10px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .topbar .title {
        font-weight: bold;
      }
      .container {
        max-width: 900px;
        margin: 40px auto;
        background: #ffffff;
        border-radius: 12px;
        padding: 32px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      }
      .btn {
        display: inline-block;
        padding: 10px 18px;
        background: #2563eb;
        color: #ffffff;
        border-radius: 8px;
        text-decoration: none;
        border: none;
        cursor: pointer;
        font-weight: 600;
      }
      .btn.secondary {
        background: #6b7280;
      }
      .btn-block {
        width: 100%;
        text-align: center;
      }
      .field {
        margin-bottom: 16px;
      }
      .field label {
        display: block;
        margin-bottom: 4px;
        font-size: 14px;
        color: #374151;
      }
      .field input {
        width: 100%;
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid #d1d5db;
        font-size: 14px;
      }
      .error {
        margin-bottom: 12px;
        color: #b91c1c;
        font-size: 14px;
      }
      .center {
        text-align: center;
      }
      .grid-buttons {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="title">RL Metais - Gerador de Relatórios END</div>
      <div>
        {% if session.user_email %}
        <span style="margin-right: 10px; font-size: 14px;">
          {{ session.user_email }}
        </span>
        <a href="{{ url_for('logout') }}" class="btn secondary">Sair</a>
        {% endif %}
      </div>
    </div>

    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
